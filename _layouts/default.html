<!DOCTYPE html>
<html>

<head>
  <title>{{ site.name }}{% if page.title %} – {{ page.title }}{% endif %}</title>

  {% include meta.html %}

  <!--[if lt IE 9]>
      <script src="http://html5shiv.googlecode.com/svn/trunk/html5.js"></script>
    <![endif]-->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Oswald:wght@500;600;700&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/style.css" />
  <link rel="alternate" type="application/rss+xml" title="{{ site.name }} - {{ site.description }}"
    href="{{ site.baseurl }}/feed.xml" />
  <link rel="shortcut icon"
    href="https://raw.githubusercontent.com/rishabhmisra/rishabhmisra.github.io/master/images/rm-favicon.ico">

  <!-- SEO Meta Tags -->
  <meta name="description" content="{{ site.description }}">
  <meta name="author" content="{{ site.name }}">
  <meta property="og:title" content="{{ site.name }}{% if page.title %} – {{ page.title }}{% endif %}">
  <meta property="og:description" content="{{ site.description }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ site.url }}{{ page.url }}">
</head>

<body>
  <div class="wrapper-masthead">
    <div class="container">
      <header class="masthead clearfix">
        <div class="masthead-left">
          <a href="{{ site.baseurl }}/" class="site-avatar"><img src="{{ site.avatar }}" alt="{{ site.name }}" /></a>
          <div class="site-info">
            <div class="site-name"><a href="{{ site.baseurl }}/"
                style="font-family: 'Oswald', sans-serif; text-transform: uppercase; font-size: 22px; letter-spacing: 1px; font-weight: 600;">{{
                site.name }}</a></div>
          </div>
        </div>
        <nav>
          <a href="{{ site.baseurl }}/blog">Blog</a>
          <a href="{{ site.baseurl }}/publications">Research</a>
          <a href="{{ site.baseurl }}/experience">Experience</a>
          <a href="{{ site.baseurl }}/features">Features</a>
          <a href="{{ site.baseurl }}/reviews">Reviews</a>
          <a href="{{ site.baseurl }}/collaborate">Collaborate</a>
          <a href="{{ site.baseurl }}/aboutme">About</a>
        </nav>
      </header>
    </div>
  </div>

  <div id="main" role="main" class="container main">
    {{ content }}
  </div>

  <div class="wrapper-footer">
    <div class="container">
      <footer class="footer">
        {% include svg-icons.html %}
        <p style="margin-top: 10px;">© {{ site.name }} · Principal ML Lead · Researcher · Author</p>
      </footer>
    </div>
  </div>

  {% include analytics.html %}
</body>

</html>
